name: Linux build

on: [push, pull_request]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug
  BUILD_DIR: Build_Linux

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Create Build Environment
      # Some projects don't allow in-source building, so create a separate build directory
      # We'll use this as our working directory for all subsequent commands
      run: cmake -E make_directory ${{github.workspace}}//Build-Linux

    - name: Update env
      run: sudo apt-get update -y

    - name: Update gcc
      run: sudo apt install g++ g++-14 gcc-14 && sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 800 --slave /usr/bin/g++ g++ /usr/bin/g++-14

    - name: Install Linux prequisities
      run: sudo apt install mesa-common-dev libxi-dev libglu1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libgtk-3-0 libgtk-3-dev

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      working-directory: ${{github.workspace}}
      run: cmake -S . -B ${BUILD_DIR} -DENABLE_TRACY=OFF -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DCMAKE_POLICY_VERSION_MINIMUM="3.5"

    - name: Build Projects
      # Build your program with the given configuration
      working-directory: ${{github.workspace}}
      run: cmake --build ${BUILD_DIR} --config ${BUILD_TYPE} --target playgroundApp_dynamic snake_dynamic playgroundApp_static snake_static -j18